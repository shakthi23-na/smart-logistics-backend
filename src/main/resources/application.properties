server.port=${PORT:8080}
spring.application.name=smart-logistics-backend

# ✅ CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,https://smart-logistics-frontend-mocha.vercel.app,https://gray-dune-0b862e200.4.azurestaticapps.net

# ✅ H2 Database (in-memory)
spring.datasource.url=jdbc:h2:mem:logisticsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ✅ JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ✅ H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ✅ Server Configuration
server.compression.enabled=true
server.compression.min-response-size=1024
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
